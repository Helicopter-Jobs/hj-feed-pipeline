name: Build JBoard XML feed (HARD)

on:
  workflow_dispatch:
  schedule:
    - cron: "45 10 */3 * *" # every 3 days at 10:45 UTC (~2:45am PT)

permissions:
  contents: write

concurrency:
  group: hj-feed-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 lxml requests pdfminer.six
          python -m playwright install --with-deps chromium

      - name: Build feed.xml (hard)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOURCES_FILE: sources_hard.txt
          MAX_JOB_LINKS_PER_SOURCE: "80"
          MAX_TOTAL_JOBS: "600"
          REQUEST_DELAY_SECONDS: "1.0"
          REQUEST_DELAY_JITTER: "0.8"
        run: |
          python scrape.py

      - name: Commit updated feed.xml + jobs.json (hard)
        run: |
          git config user.name "hj-feed-bot"
          git config user.email "hj-feed-bot@users.noreply.github.com"
          git add feed.xml jobs.json
          git commit -m "Update feed (hard)" || echo "No changes"
          git pull --rebase origin main
          git push
